name: Chile Hospital Procurement Pipeline

on:
  schedule:
    - cron: '0 11 * * *'  # todos los días a las 08:00 Chile (UTC-3 = 11:00 UTC)
  workflow_dispatch:        # permite ejecutarlo manualmente desde GitHub

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests pandas python-dotenv

      - name: Crear archivo .env con ticket
        run: echo "MERCADOPUBLICO_TICKET=${{ secrets.MERCADOPUBLICO_TICKET }}" > .env

      - name: Ejecutar pipeline
        run: python pipeline.py

      - name: Guardar CSV en repositorio
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "data: actualización automática $(date +'%Y-%m-%d')"
          git push